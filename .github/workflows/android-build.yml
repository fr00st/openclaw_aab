name: Android Build

on:
  pull_request:
    paths:
      - 'apps/android/**'
      - '.github/workflows/android-build.yml'
  push:
    branches: [main]
    paths:
      - 'apps/android/**'
      - '.github/workflows/android-build.yml'
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/android
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Gradle version
        run: ./gradlew --version

      - name: Build debug APKs
        run: |
          ./gradlew :app:assemblePlayDebug :app:assembleThirdPartyDebug --stacktrace

      - name: Unit tests
        run: |
          ./gradlew :app:testPlayDebugUnitTest :app:testThirdPartyDebugUnitTest --stacktrace

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apks
          path: |
            apps/android/app/build/outputs/apk/play/debug/*.apk
            apps/android/app/build/outputs/apk/thirdParty/debug/*.apk
          if-no-files-found: error
